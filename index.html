<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Trolley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Barcode Scanner (Quagga2) -->
  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    #qr-reader {
      width: 320px;
      height: 240px;
      margin: 20px auto;
      border: 2px solid #333;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
      border: none;
      background: #333;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #555;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 80%;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #eee;
    }

    #popup {
      display: none;
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }

    #scan-status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🛒 Smart Trolley</h1>

  <!-- 📷 Scanner -->
  <div id="qr-reader"></div>

  <div>
    <button onclick="startScanner()">📷 Start Scanner</button>
    <button onclick="stopScanner()">⛔ Stop</button>
    <button onclick="generateBill()">🧾 Generate Bill</button>
  </div>

  <p id="scan-status">Scan a barcode</p>
  <div id="popup">✅ Product Added</div>

  <!-- 🛒 Cart -->
  <h2>🧾 Your Cart</h2>

  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Subtotal</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="cart-body"></tbody>
  </table>

  <h3 id="total">Total: ₹0</h3>

  <!-- Your JS -->
  <script src="script.js"></script>

</body>
</html>
