<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Trolley - QR Scanner</title>

  <link rel="stylesheet" href="style/style.css" />
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<header>
  <h1>🛒 Smart Trolley</h1>
</header>

<main>

  <!-- Scanner -->
  <section id="scanner-section">
    <div id="qr-reader"></div>
    <p id="scan-status">Scan a product QR code</p>
  </section>

  <!-- Cart -->
  <section id="cart-section">
    <h2>🧾 Your Cart</h2>

    <table id="cart">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="cart-body"></tbody>
    </table>

    <h3 id="total">Total: ₹0</h3>
  </section>

</main>

<!-- Popup -->
<div id="popup">✅ Product Added</div>

<script src="script.js"></script>

</body>
</html>
