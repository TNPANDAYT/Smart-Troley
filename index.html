<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Trolley</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- PDF Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
  <header>
    <h1>🛒 Smart Trolley</h1>
  </header>

  <main>

    <!-- 📷 Scanner Section -->
    <section id="scanner-section">
      <div id="qr-reader" style="width:300px;"></div>

      <button onclick="startScanner()">📷 Start Scanner</button>
      <button onclick="stopScanner()">⛔ Stop</button>
      <button onclick="generateBill()">🧾 Generate Bill</button>

      <p id="scan-status">Scan a product barcode</p>
    </section>

    <!-- 🛒 Cart Section -->
    <section id="cart-section">
      <h2>🧾 Your Cart</h2>

      <table id="cart" border="1">
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cart-body"></tbody>
      </table>

      <h3 id="total">Total: ₹0</h3>
    </section>

  </main>

  <!-- Popup -->
  <div id="popup" style="display:none;">✅ Product Added</div>

  <!-- Your JS -->
  <script src="script.js"></script>
</body>
</html>
